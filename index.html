<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <title>LOGIN</title>
</head>

<body>
  <div class="card">
    <div class="logo">
      <img src="./img/logo.svg" alt="">
      <p class="desc_logo">Organiza tu trabajo</p>
    </div>
    <form class="form">
      <div class="form_content">
        <h2>Iniciar sesión</h2>
        <div class="input_group">
          <input type="text" placeholder="Correo">
        </div>
        <div class="input_group">
          <input type="password" placeholder="Contraseña">
          <a href="#" class="link_text">¿Olvidaste la contraseña?</a>
        </div>
        <button class="button_form">Acceder</button>
        <div class="recordar_check">
          <input type="checkbox">
          <p>Recordarme durante 30 días</p>
        </div>
        <div class="google_button">
          <img src="./img/logo_google.svg" alt="">
          <p>Continuar con Google</p>
        </div>
      </div>
      <div class="crear_cuenta">
        <p>¿No tienes cuenta?</p>
        <a href="" class="link_text">Crear una cuenta</a>
      </div>
    </form>
  </div>
</body>

</html>
